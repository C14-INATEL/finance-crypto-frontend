version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.11.0
    working_directory: ~/project

jobs:
  instalar_dependencias:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Instalar Dependências na subpasta do projeto
          command: |
            cd finance-cypto
            npm install
      - persist_to_workspace:
          root: ~/project
          paths:
            - finance-cypto/node_modules

  rodar_testes:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Executar Testes Unitários com Vitest
          command: cd finance-cypto && npx ng test --watch=false

workflows:
  version: 2
  pipeline_angular_workflow:
    jobs:
      - instalar_dependencias
      - rodar_testes:
          requires:
            - instalar_dependencias