<div class="flex h-screen bg-zinc-950 font-sans text-zinc-300">

    <aside
        class="w-64 bg-zinc-900 shadow-[4px_0_15px_rgba(0,0,0,0.5)] flex flex-col justify-between border-r border-zinc-800">
        <div>
            <div class="h-20 flex items-center justify-center border-b border-zinc-800">
                <h1
                    class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-600 uppercase tracking-widest drop-shadow-[0_0_8px_rgba(245,158,11,0.2)]">
                    Finance Crypto
                </h1>
            </div>

            <nav class="p-4 space-y-3 mt-4">

                <a routerLink="/home"
                    routerLinkActive="bg-zinc-800 text-amber-400 border-l-4 border-amber-500 shadow-[inset_4px_0_0_rgba(245,158,11,0.5)]"
                    class="flex items-center px-4 py-3 text-zinc-400 rounded-r-lg hover:bg-zinc-800 hover:text-amber-400 transition-all duration-300 font-medium tracking-wide">
                    <span>Visão Geral</span>
                </a>

                <a routerLink="/dashboard"
                    routerLinkActive="bg-zinc-800 text-amber-400 border-l-4 border-amber-500 shadow-[inset_4px_0_0_rgba(245,158,11,0.5)]"
                    class="flex items-center px-4 py-3 text-zinc-400 rounded-r-lg hover:bg-zinc-800 hover:text-amber-400 transition-all duration-300 font-medium tracking-wide">
                    <span>Dashboard Cripto</span>
                </a>

                <a routerLink="/rankingAtivos"
                    routerLinkActive="bg-zinc-800 text-amber-400 border-l-4 border-amber-500 shadow-[inset_4px_0_0_rgba(245,158,11,0.5)]"
                    class="flex items-center px-4 py-3 text-zinc-400 rounded-r-lg hover:bg-zinc-800 hover:text-amber-400 transition-all duration-300 font-medium tracking-wide">
                    <span>Ranking de Ativos</span>
                </a>

            </nav>
        </div>

        <div class="p-4 border-t border-zinc-800 bg-zinc-900/50">
            <button (click)="sair()"
                class="w-full flex items-center justify-center px-4 py-3 text-amber-500 border border-amber-500/30 hover:bg-amber-500 hover:text-zinc-950 rounded-lg transition-all duration-300 font-bold uppercase tracking-wider text-sm shadow-[0_0_10px_rgba(245,158,11,0.05)] hover:shadow-[0_0_15px_rgba(245,158,11,0.3)]">
                Desconectar
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 bg-zinc-950 relative">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-yellow-600/5 rounded-full blur-3xl pointer-events-none">
        </div>

        <div class="relative z-10">
            <router-outlet></router-outlet>
        </div>
    </main>

</div>
