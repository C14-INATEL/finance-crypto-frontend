<div class="home-container">
  
  <section class="card home-card">
    
    <header class="home-header">
      <div>
        <h2 class="title">Finance Crypto</h2>
        <p class="subtitle">Minha Carteira</p>
      </div>
      <a routerLink="/login" class="link-sair">Sair</a>
    </header>

    <hr class="divider">

    <section class="balance-section">
      <p class="label-text" (click)="alternarVisibilidadeSaldo()" style="cursor: pointer;" title="Clique para ocultar/mostrar">
        Patrimônio Atualizado <span style="font-size: 16px;">{{ saldoVisivel ? '👁️' : '🙈' }}</span>
      </p>
      
      <h1 class="balance-value">
        {{ saldoVisivel ? 'R$ ' + patrimonioTotal : 'R$ •••••••' }}
      </h1>
      
      <div class="action-buttons">
        <button class="btn-primary" (click)="comprarAtivo(500)">
          <span class="icon">↑</span> Comprar Ativo
        </button>
        <button class="btn-outline" (click)="venderAtivo(500)">
          <span class="icon">↓</span> Vender Ativo
        </button>
      </div>
    </section>

    <section class="list-section">
      <h3 class="card-subtitle">Rentabilidade dos Ativos</h3>
      
      <div class="crypto-list">
        <div class="crypto-item">
          <div class="crypto-brand">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=032" alt="BTC" class="crypto-logo">
            <div class="crypto-info">
              <strong>Bitcoin (BTC)</strong>
              <span>0.05 na carteira</span>
            </div>
          </div>
          <div class="crypto-values">
            <strong>R$ 10.200,00</strong>
            <span class="badge" [ngClass]="obterClasseBadge(5.2)">↑ +5.2%</span>
          </div>
        </div>

        <div class="crypto-item">
          <div class="crypto-brand">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=032" alt="ETH" class="crypto-logo">
            <div class="crypto-info">
              <strong>Ethereum (ETH)</strong>
              <span>0.30 na carteira</span>
            </div>
          </div>
          <div class="crypto-values">
            <strong>R$ 4.320,00</strong>
            <span class="badge" [ngClass]="obterClasseBadge(-1.2)">↓ -1.2%</span>
          </div>
        </div>
      </div>
    </section>

  </section>

</div>
