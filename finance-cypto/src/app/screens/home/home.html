<div class="max-w-4xl mx-auto w-full">

  <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 md:p-8 shadow-2xl shadow-black/40">

    <header class="flex justify-between items-start mb-6">
      <div>
        <h2 class="text-2xl font-bold text-zinc-100 tracking-wide">Finance Crypto</h2>
        <p class="text-sm text-zinc-400 mt-1">Minha Carteira</p>
      </div>

      <a routerLink="/login"
        class="text-sm font-medium text-amber-500 hover:text-amber-400 transition-colors underline-offset-4 hover:underline">
        Sair
      </a>
    </header>

    <hr class="border-zinc-800 my-6">

    <section class="flex flex-col items-center text-center space-y-4 mb-10">
      <p class="text-zinc-400 text-sm flex items-center gap-2 cursor-pointer hover:text-zinc-300 transition-colors select-none"
        (click)="alternarVisibilidadeSaldo()" title="Clique para ocultar/mostrar">
        Patrimônio Atualizado
        <span class="text-base">{{ saldoVisivel ? '👁️' : '🙈' }}</span>
      </p>

      <h1
        class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-600 drop-shadow-[0_0_10px_rgba(245,158,11,0.1)]">
        {{ saldoVisivel ? 'R$ ' + patrimonioTotal : 'R$ •••••••' }}
      </h1>

      <div class="flex flex-wrap justify-center gap-4 mt-6">
        <button
          class="flex items-center gap-2 px-6 py-3 bg-amber-500 text-zinc-950 font-bold rounded-lg hover:bg-amber-400 transition-all shadow-[0_0_15px_rgba(245,158,11,0.15)] hover:shadow-[0_0_20px_rgba(245,158,11,0.3)]"
          (click)="comprarAtivo(500)">
          <span class="font-black">↑</span> Comprar Ativo
        </button>
        <button
          class="flex items-center gap-2 px-6 py-3 border border-amber-500/30 text-amber-500 font-bold rounded-lg hover:bg-amber-500 hover:text-zinc-950 transition-all shadow-sm"
          (click)="venderAtivo(500)">
          <span class="font-black">↓</span> Vender Ativo
        </button>
      </div>
    </section>

    <section>
      <h3 class="text-lg font-semibold text-zinc-200 mb-4">Rentabilidade dos Ativos</h3>

      <div class="space-y-3">
        <div
          class="flex justify-between items-center bg-zinc-950/50 border border-zinc-800/60 p-4 rounded-xl hover:border-amber-500/40 transition-colors group">
          <div class="flex items-center gap-4">
            <div class="bg-zinc-800 p-2 rounded-full group-hover:bg-zinc-700 transition-colors">
              <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=032" alt="BTC" class="w-8 h-8">
            </div>
            <div class="flex flex-col">
              <strong class="text-zinc-100 text-base">Bitcoin (BTC)</strong>
              <span class="text-xs text-zinc-500 mt-0.5">0.05 na carteira</span>
            </div>
          </div>
          <div class="flex flex-col items-end text-right">
            <strong class="text-zinc-100 text-lg">R$ 10.200,00</strong>
            <span class="text-xs font-bold px-2 py-1 rounded-md mt-1 bg-emerald-500/10 text-emerald-400"
              [ngClass]="obterClasseBadge(5.2)">
              ↑ +5.2%
            </span>
          </div>
        </div>

        <div
          class="flex justify-between items-center bg-zinc-950/50 border border-zinc-800/60 p-4 rounded-xl hover:border-amber-500/40 transition-colors group">
          <div class="flex items-center gap-4">
            <div class="bg-zinc-800 p-2 rounded-full group-hover:bg-zinc-700 transition-colors">
              <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=032" alt="ETH" class="w-8 h-8">
            </div>
            <div class="flex flex-col">
              <strong class="text-zinc-100 text-base">Ethereum (ETH)</strong>
              <span class="text-xs text-zinc-500 mt-0.5">0.30 na carteira</span>
            </div>
          </div>
          <div class="flex flex-col items-end text-right">
            <strong class="text-zinc-100 text-lg">R$ 4.320,00</strong>
            <span class="text-xs font-bold px-2 py-1 rounded-md mt-1 bg-rose-500/10 text-rose-400"
              [ngClass]="obterClasseBadge(-1.2)">
              ↓ -1.2%
            </span>
          </div>
        </div>
      </div>
    </section>

  </section>

</div>
