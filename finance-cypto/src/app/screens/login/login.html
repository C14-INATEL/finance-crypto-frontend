<div class="min-h-screen flex items-center justify-center bg-zinc-950 p-4 relative overflow-hidden">

    <div class="absolute -top-40 -left-40 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-yellow-600/5 rounded-full blur-3xl pointer-events-none">
    </div>

    <div
        class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl shadow-black/50 p-8 relative z-10">

        <h2
            class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-600 text-center mb-6 tracking-wide drop-shadow-[0_0_8px_rgba(245,158,11,0.1)]">
            Bem-vindo de volta
        </h2>

        <form class="space-y-5" (ngSubmit)="onLogin()">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1.5">E-mail</label>
                <input type="email" name="email" [(ngModel)]="email" placeholder="seu@email.com"
                    class="block w-full px-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg text-zinc-200 placeholder-zinc-600 focus:border-amber-500/60 focus:ring-1 focus:ring-amber-500/40 outline-none transition duration-200">
            </div>

            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1.5">Senha</label>
                <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••"
                    class="block w-full px-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg text-zinc-200 placeholder-zinc-600 focus:border-amber-500/60 focus:ring-1 focus:ring-amber-500/40 outline-none transition duration-200">
            </div>

            @if (errorMessage) {
            <p
                class="text-rose-400 text-sm bg-rose-500/10 border border-rose-500/20 py-2 px-3 rounded-lg text-center font-medium animate-pulse">
                ⚠️ {{ errorMessage }}
            </p>
            }

            <button type="submit"
                class="w-full mt-2 bg-amber-500 hover:bg-amber-400 text-zinc-950 font-bold py-2.5 px-4 rounded-lg transition duration-300 shadow-[0_0_15px_rgba(245,158,11,0.1)] hover:shadow-[0_0_20px_rgba(245,158,11,0.25)]">
                Entrar
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-zinc-500">
            Não tem uma conta?
            <a href="/signup"
                class="text-amber-500 hover:text-amber-400 font-medium transition-colors ml-1 hover:underline underline-offset-4">
                Cadastre-se
            </a>
        </p>
    </div>
</div>
