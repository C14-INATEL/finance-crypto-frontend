<div class="min-h-screen p-6 md:p-12 text-zinc-100 font-sans">
    <div class="max-w-4xl mx-auto">

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-8 shadow-2xl relative overflow-hidden group">
            <div
                class="absolute -top-24 -right-24 w-80 h-80 bg-amber-500/10 rounded-full blur-[100px] group-hover:bg-amber-500/20 transition-all duration-700">
            </div>

            <div class="flex flex-col md:flex-row items-center gap-10 relative z-10">
                <div class="flex-1 text-center md:text-left">
                    <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mb-2">
                        <h1 class="text-3xl font-black text-white tracking-tight">@{{ usuario?.username }}</h1>
                    </div>

                    <p class="text-zinc-400 text-lg mb-2">{{ usuario?.email }}</p>

                    <p class="text-zinc-600 font-mono text-sm">ID: {{ usuario?.userId }}</p>

                    <div class="mt-8 flex flex-wrap justify-center md:justify-start gap-4">
                        <button (click)="toggleEditModal()"
                            class="px-6 py-2.5 bg-amber-500 hover:bg-amber-600 text-zinc-950 rounded-xl font-bold transition-all duration-300 shadow-lg shadow-amber-500/10 active:scale-95">
                            Editar Dados
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-8 border-t border-zinc-900">
            <div
                class="flex flex-col md:flex-row items-center justify-between gap-4 p-6 bg-rose-500/5 border border-rose-500/10 rounded-2xl">
                <div class="text-center md:text-left">
                    <h3 class="text-rose-500 font-bold text-lg">Zona Crítica</h3>
                    <p class="text-zinc-500 text-sm mt-1">A exclusão da conta removerá permanentemente seus dados do
                        sistema.</p>
                </div>
                <button (click)="toggleDeleteModal()"
                    class="text-rose-500 hover:text-white hover:bg-rose-600 px-6 py-2.5 rounded-xl font-bold transition-all border border-rose-500/20 whitespace-nowrap">
                    Excluir Conta
                </button>
            </div>
        </div>

    </div>
</div>

<app-edit-profile-modal *ngIf="showEditModal" [dadosUsuario]="usuario" (close)="toggleEditModal()"
    (save)="handleUpdate($event)">
</app-edit-profile-modal>

<app-delete-account-modal *ngIf="showDeleteModal" (close)="toggleDeleteModal()">
</app-delete-account-modal>
